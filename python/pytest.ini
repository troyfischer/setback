[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

addopts =
    -v
    --tb=short
    --strict-markers
    -s

markers =
    unit: Unit tests (fast, use mocks)
    integration: Integration tests (slower, use docker)
    slow: Slow running tests

# Logging
log_cli = false

# Test environment
env =
    D:LOG_LEVEL=INFO
