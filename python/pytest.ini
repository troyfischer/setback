[pytest]
# Test discovery
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Output options
addopts =
    -v
    --tb=short
    --strict-markers
    -s

# Markers for test categorization
markers =
    unit: Unit tests (fast, use mocks)
    integration: Integration tests (slower, use docker)
    slow: Slow running tests

# Logging
log_cli = false
log_cli_level = INFO
